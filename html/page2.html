<!DOCTYPE html>
<html lang="vi">
   <head>
         <title>Thiet ke form</title>
         <meta charset="utf-8">
         <link rel = "stylesheet" href =  "../css/style2.css">
   <head>
   <body>
      <div class="container">
        <form id = "frmLogin">
            <h3 class = "title">Dang nhap he thong</h3>
            <div class = "form-group">
                <label for = "txtUsername">Ten dang nhap: </label>
                <input class = "form-control" type = "text" id = "txtUsername" name = "txtUsername" placeholder="Nhap ten "
            </div>
            <div class = "form-group">
                <label  for ="txtPassword">Matkhau: </label>
                <input class = "form-control" type = "password" id = "txtPassword" name = "txtPassword" placeholder="Nhap mat khau"
            </div>
            <input class="button" type = "submit" name = "sbLogin" value = "Dang nhap">
            <input class="button" type = "reset" name = "rsCancel" value =  "Huy bo">
        </form>
      </div>
   </body>
</html>
