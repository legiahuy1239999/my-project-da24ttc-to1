<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>
body{
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

.form-box{
    width:500px;
    margin:40px auto;
    padding:20px;
    background:#1c1c1c;
    border-radius:10px;
}

h2{
    text-align:center;
    color:red;
}

label{
    display:block;
    margin-top:12px;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:5px;
    background:#2a2a2a;
    color:white;
}

input:focus, select:focus{
    outline:none;
    border:1px solid red;
}

.button-group{
    text-align:center;
    margin-top:20px;
}

button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
}

button[type="submit"]{
    background:red;
    color:white;
}

button[type="reset"]{
    background:#444;
    color:white;
}
</style>

</head>

<body>

<div class="form-box">
<h2>Form Đăng Ký</h2>

<form>

<label>SĐT</label>
<input type="tel" required>

<label>Địa chỉ</label>
<input type="text" required>

<label>Họ tên</label>
<input type="text" required>

<label>MSSV</label>
<input type="text" required>

<label>Lớp</label>
<select>
<option>DA24TTC</option>
</select>

<label>Giới tính</label>
<input type="text">

<label>Ngày sinh</label>
<input type="date">

<label>Email</label>
<input type="email">

<label>Điểm mạnh</label>
<select>
<option>Thiết kế Web</option>
<option>C++</option>
<option>Cơ sở dữ liệu</option>
</select>

<label>Hình ảnh</label>
<input type="file">

<div class="button-group">
<button type="submit">Đăng ký</button>
<button type="reset">Nhập lại</button>
</div>

</form>
</div>

</body>
</html>
