<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>In bảng cửu chương</title>
</head>
<body>
    <div class="container">
        <h2>In bảng cửu chương</h2>
        <form id="formInbBangCC">
            <label for="so">Nhập số:</label>
            <input type="number" id="so" name="so" min="1" max="10" required>
            <button type="button" onclick="inBangCuuChuong()">In</button>
        </form>
        <div id="kq"></div>
    </div>

    <script src="../js/lib.js"></script>
    <script>
        function inBangCuuChuong() {
            let so = document.getElementById('so').value;
            let kq = document.getElementById('kq');
            if (so === '' || so < 1 || so > 10) {
                kq.innerHTML = 'Vui lòng nhập số từ 1 đến 10';
                return;
            }
            let bang = '<h3>Bảng cửu chương ' + so + '</h3><ul>';
            for (let i = 1; i <= 10; i++) {
                bang += '<li>' + so + ' x ' + i + ' = ' + (so * i) + '</li>';
            }
            bang += '</ul>';
            kq.innerHTML = bang;
        }
    </script>
</body>
</html></content>
